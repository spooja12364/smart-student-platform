name: 🤖 Android Appium E2E Automation + GitHub Pages Reporting

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test Suite to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - smoke
          - auth
          - regression
      android_api:
        description: 'Android API Level'
        required: false
        default: '34'
        type: choice
        options:
          - '30'
          - '31'
          - '32'
          - '33'
          - '34'
  schedule:
    - cron: '0 2 * * *'   # Nightly at 02:00 UTC

# ─── Concurrency ────────────────────────────────────────────────
concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

# ─── Global env ─────────────────────────────────────────────────
env:
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: ${{ github.event.inputs.android_api || '34' }}
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_TARGET: 'google_apis'
  ANDROID_ARCH: 'x86_64'
  AVD_NAME: 'SmartStudent_E2E_AVD'
  APPIUM_VERSION: '2.5.4'
  APP_PACKAGE: 'com.example.smart_student_platform'
  APP_ACTIVITY: 'com.example.smart_student_platform.MainActivity'
  APPIUM_HOST: '127.0.0.1'
  APPIUM_PORT: '4723'
  TEST_SUITE: ${{ github.event.inputs.suite || 'full' }}
  REPORTS_DIR: 'automation/test-reports'
  PAGES_DIR: 'gh-pages'

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — BUILD APK
  # ════════════════════════════════════════════════════════════════
  build-apk:
    name: 🏗️ Stage 1-5 — Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Stage 1: Checkout ──────────────────────────────────────
      - name: '📥 Stage 1: Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Stage 2: Setup Java ────────────────────────────────────
      - name: '☕ Stage 2: Setup Java ${{ env.JAVA_VERSION }}'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      # ── Stage 3: Setup Flutter ─────────────────────────────────
      - name: '🐦 Stage 3: Setup Flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # ── Stage 4: Install Dependencies ──────────────────────────
      - name: '📦 Stage 4: Install Flutter Dependencies'
        run: |
          flutter --version
          flutter pub get
        working-directory: .

      # ── Stage 5: Build Debug APK ──────────────────────────────
      - name: '🔨 Stage 5: Build Debug APK'
        run: |
          flutter build apk --debug --no-tree-shake-icons 2>&1 | tail -50
          echo "✅ APK built successfully"
          ls -lh build/app/outputs/flutter-apk/
        working-directory: .

      - name: '📤 Upload APK Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — RUN E2E TESTS
  # ════════════════════════════════════════════════════════════════
  run-e2e-tests:
    name: 📱 Stage 6-21 — Emulator + Appium + E2E Tests
    runs-on: ubuntu-latest
    needs: build-apk
    timeout-minutes: 90

    steps:
      # ── Stage 1: Checkout ──────────────────────────────────────
      - name: '📥 Stage 1: Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Stage 2: Setup Java ────────────────────────────────────
      - name: '☕ Stage 2: Setup Java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      # ── Stage 3: Setup Android SDK ─────────────────────────────
      - name: '🤖 Stage 3: Setup Android SDK'
        uses: android-actions/setup-android@v3

      - name: '📱 Install Android Emulator Packages'
        run: |
          echo "y" | sdkmanager --install \
            "platform-tools" \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "emulator" \
            "system-images;android-${{ env.ANDROID_API_LEVEL }};${{ env.ANDROID_TARGET }};${{ env.ANDROID_ARCH }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS }}"
          echo "✅ Android SDK packages installed"

      # ── Stage 4: Download APK ─────────────────────────────────
      - name: '📥 Stage 4: Download APK Artifact'
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: apk/

      - name: 'Verify APK Downloaded'
        run: |
          ls -lh apk/
          echo "APK_PATH=$(pwd)/apk/app-debug.apk" >> $GITHUB_ENV

      # ── Stage 5: Setup Node & Appium ──────────────────────────
      - name: '🟢 Install Node.js & Appium'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: '🔧 Install Appium ${{ env.APPIUM_VERSION }}'
        run: |
          npm install -g appium@${{ env.APPIUM_VERSION }}
          appium driver install uiautomator2
          appium --version
          echo "✅ Appium installed"

      # ── Stage 6: Enable KVM + Create AVD ─────────────────────
      - name: '⚡ Stage 6: Enable KVM Hardware Acceleration'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get install -y cpu-checker
          sudo kvm-ok || echo "KVM check completed"

      - name: '📲 Create Android Virtual Device (AVD)'
        run: |
          echo "no" | avdmanager create avd \
            --name "${{ env.AVD_NAME }}" \
            --package "system-images;android-${{ env.ANDROID_API_LEVEL }};${{ env.ANDROID_TARGET }};${{ env.ANDROID_ARCH }}" \
            --device "pixel_4" \
            --force
          echo "✅ AVD created: ${{ env.AVD_NAME }}"

      # ── Stage 7: Start Emulator ───────────────────────────────
      - name: '🚀 Stage 7: Start Android Emulator'
        run: |
          $ANDROID_HOME/emulator/emulator \
            -avd "${{ env.AVD_NAME }}" \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -no-snapshot \
            -gpu swiftshader_indirect \
            -memory 2048 \
            -cores 2 \
            &
          echo "EMULATOR_PID=$!" >> $GITHUB_ENV
          echo "🚀 Emulator started (PID: $!)"

      # ── Stage 8: Wait for Emulator ────────────────────────────
      - name: '⏳ Stage 8: Wait for Emulator Ready'
        timeout-minutes: 10
        run: |
          echo "Waiting for emulator to boot..."
          adb wait-for-device
          
          # Poll for boot completion
          BOOT_COMPLETE=""
          ATTEMPTS=0
          MAX_ATTEMPTS=60
          while [ -z "$BOOT_COMPLETE" ] && [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            BOOT_COMPLETE=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            if [ "$BOOT_COMPLETE" = "1" ]; then
              echo "✅ Emulator booted successfully!"
              break
            fi
            echo "⏳ Boot attempt $((ATTEMPTS+1))/$MAX_ATTEMPTS — waiting..."
            sleep 5
            ATTEMPTS=$((ATTEMPTS+1))
          done
          
          if [ "$BOOT_COMPLETE" != "1" ]; then
            echo "❌ Emulator failed to boot"
            adb logcat -d | tail -50
            exit 1
          fi
          
          # Additional stabilization
          adb shell input keyevent 82 2>/dev/null || true
          adb shell settings put global window_animation_scale 0 2>/dev/null || true
          adb shell settings put global transition_animation_scale 0 2>/dev/null || true
          adb shell settings put global animator_duration_scale 0 2>/dev/null || true
          sleep 5
          echo "✅ Emulator ready for testing"

      - name: '📋 Verify Emulator'
        run: |
          adb devices -l
          adb shell getprop ro.build.version.release
          adb shell getprop ro.product.model
          echo "DEVICE_NAME=$(adb devices | grep emulator | awk '{print $1}')" >> $GITHUB_ENV

      # ── Stage 9: Install APK ──────────────────────────────────
      - name: '📦 Stage 9: Install APK on Emulator'
        run: |
          echo "Installing APK: ${{ env.APK_PATH }}"
          adb install -r "${{ env.APK_PATH }}"
          sleep 3
          # Verify installation
          INSTALLED=$(adb shell pm list packages | grep "${{ env.APP_PACKAGE }}" || true)
          if [ -z "$INSTALLED" ]; then
            echo "❌ APK installation failed"
            exit 1
          fi
          echo "✅ APK installed: $INSTALLED"

      # ── Stage 10: Start Appium Server ─────────────────────────
      - name: '🔌 Stage 10: Start Appium Server'
        run: |
          mkdir -p automation/test-reports/logs
          appium \
            --address ${{ env.APPIUM_HOST }} \
            --port ${{ env.APPIUM_PORT }} \
            --log automation/test-reports/logs/appium-server.log \
            --log-timestamp \
            --log-no-colors \
            --relaxed-security \
            &
          echo "APPIUM_PID=$!" >> $GITHUB_ENV
          echo "🔌 Appium started (PID: $!)"

      # ── Stage 11: Verify Appium Health ────────────────────────
      - name: '🏥 Stage 11: Verify Appium Health'
        run: |
          RETRIES=0
          MAX=20
          while [ $RETRIES -lt $MAX ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ env.APPIUM_HOST }}:${{ env.APPIUM_PORT }}/status || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Appium server is healthy (HTTP 200)"
              curl -s http://${{ env.APPIUM_HOST }}:${{ env.APPIUM_PORT }}/status | python3 -m json.tool
              break
            fi
            echo "⏳ Appium not ready yet (attempt $((RETRIES+1))/$MAX)... retrying in 3s"
            sleep 3
            RETRIES=$((RETRIES+1))
          done
          if [ $RETRIES -eq $MAX ]; then
            echo "❌ Appium server failed to start"
            cat automation/test-reports/logs/appium-server.log | tail -30 || true
            exit 1
          fi

      # ── Stage 12: Execute E2E Tests ───────────────────────────
      - name: '🧪 Stage 12: Execute Appium E2E Tests'
        id: run_tests
        continue-on-error: true
        env:
          platform: Android
          deviceName: emulator-5554
          appiumHost: ${{ env.APPIUM_HOST }}
          appiumPort: ${{ env.APPIUM_PORT }}
          appPackage: ${{ env.APP_PACKAGE }}
          appActivity: ${{ env.APP_ACTIVITY }}
          apkPath: ${{ env.APK_PATH }}
          androidVersion: "${{ env.ANDROID_API_LEVEL }}.0"
          retryCount: "2"
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          cd automation
          
          SUITE_FILE="src/test/resources/testng-suites/testng-full-suite.xml"
          case "${{ env.TEST_SUITE }}" in
            smoke)      SUITE_FILE="src/test/resources/testng-suites/testng-smoke.xml" ;;
            auth)       SUITE_FILE="src/test/resources/testng-suites/testng-auth.xml" ;;
            regression) SUITE_FILE="src/test/resources/testng-suites/testng-regression.xml" ;;
          esac
          
          echo "🧪 Running suite: $SUITE_FILE"
          
          mvn test \
            -Dsurefire.suiteXmlFiles="$SUITE_FILE" \
            -Dplatform=Android \
            -DdeviceName=emulator-5554 \
            -DappiumHost=${{ env.APPIUM_HOST }} \
            -DappiumPort=${{ env.APPIUM_PORT }} \
            -DappPackage=${{ env.APP_PACKAGE }} \
            -DappActivity=${{ env.APP_ACTIVITY }} \
            -DapkPath=${{ env.APK_PATH }} \
            -DandroidVersion="${{ env.ANDROID_API_LEVEL }}.0" \
            -DretryCount=2 \
            -DGITHUB_RUN_NUMBER=${{ github.run_number }} \
            -DGITHUB_REF_NAME=${{ github.ref_name }} \
            -DGITHUB_SHA=${{ github.sha }} \
            --no-transfer-progress \
            2>&1 | tee test-reports/logs/maven-output.log || true
          
          echo "TEST_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
          echo "✅ Test execution completed"

      # ── Stage 13: Capture Screenshots & Logs ─────────────────
      - name: '📸 Stage 13: Capture Device Screenshot'
        if: always()
        run: |
          mkdir -p automation/test-reports/screenshots
          adb exec-out screencap -p > automation/test-reports/screenshots/final-device-state.png 2>/dev/null || true
          echo "📸 Device screenshot captured"

      - name: '📋 Capture Device Logs'
        if: always()
        run: |
          mkdir -p automation/test-reports/logs
          adb logcat -d > automation/test-reports/logs/device-logcat.log 2>/dev/null || true
          adb shell dumpsys activity > automation/test-reports/logs/activity-dump.log 2>/dev/null || true
          echo "📋 Device logs captured"

      # ── Stage 14-17: Generate Reports ────────────────────────
      - name: '📊 Stage 14-17: Generate Reports (Excel + HTML + JSON + MD)'
        if: always()
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          cd automation
          echo "📊 Reports are generated by the framework during test execution"
          
          # Create placeholder reports if tests didn't run
          mkdir -p test-reports/HTML test-reports/JSON test-reports/Summary test-reports/Excel
          
          # Generate minimal summary if no summary.md exists
          if [ ! -f "test-reports/Summary/summary.md" ]; then
            cat > test-reports/Summary/summary.md << 'EOF'
          # 🤖 Android Appium E2E Execution Summary

          | Field | Value |
          |---|---|
          | Build Number | #${{ github.run_number }} |
          | Execution Date | $(date '+%Y-%m-%d %H:%M:%S') |
          | Git Commit | `$(echo ${{ github.sha }} | cut -c1-8)` |
          | Branch | `${{ github.ref_name }}` |
          | Device | emulator-5554 |
          | Android Version | ${{ env.ANDROID_API_LEVEL }}.0 |
          | App Package | ${{ env.APP_PACKAGE }} |

          ## 📊 Execution Metrics

          > Reports generated by the Appium framework during test execution.
          > See attached artifacts for full Excel, HTML, and JSON reports.

          EOF
          fi
          
          echo "✅ Reports stage completed"

      # ── Stage 18: Upload Artifacts ────────────────────────────
      - name: '📤 Stage 18: Upload All Artifacts'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-e2e-reports-build-${{ github.run_number }}
          retention-days: 30
          path: |
            automation/test-reports/
            automation/test-reports/HTML/
            automation/test-reports/JSON/
            automation/test-reports/Excel/
            automation/test-reports/screenshots/
            automation/test-reports/logs/
            automation/test-reports/Summary/

      # ── Stage 19: Prepare GitHub Pages ───────────────────────
      - name: '🌐 Stage 19: Prepare GitHub Pages Content'
        if: always()
        run: |
          mkdir -p ${{ env.PAGES_DIR }}/reports/latest
          mkdir -p ${{ env.PAGES_DIR }}/reports/history/build-${{ github.run_number }}
          
          # Copy reports to latest
          if [ -d "automation/test-reports" ]; then
            cp -r automation/test-reports/HTML/. ${{ env.PAGES_DIR }}/reports/latest/ 2>/dev/null || true
            cp -r automation/test-reports/JSON/. ${{ env.PAGES_DIR }}/reports/latest/ 2>/dev/null || true
            cp -r automation/test-reports/Summary/. ${{ env.PAGES_DIR }}/reports/latest/ 2>/dev/null || true
            cp -r automation/test-reports/screenshots ${{ env.PAGES_DIR }}/reports/latest/ 2>/dev/null || true
            cp -r automation/test-reports/logs ${{ env.PAGES_DIR }}/reports/latest/ 2>/dev/null || true
          fi
          
          # Archive to history
          if [ -d "automation/test-reports" ]; then
            cp -r automation/test-reports/. ${{ env.PAGES_DIR }}/reports/history/build-${{ github.run_number }}/ 2>/dev/null || true
          fi

      - name: '🏠 Create GitHub Pages Index'
        if: always()
        run: |
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          
          cat > ${{ env.PAGES_DIR }}/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Smart Student Platform — E2E Test Reports</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh}
              .hero{background:linear-gradient(135deg,#1a237e,#283593);padding:50px 20px;text-align:center}
              .hero h1{font-size:2.5em;color:#fff;margin-bottom:10px}
              .hero p{color:#90caf9;font-size:1.1em}
              .hero .meta{color:#b0bec5;margin-top:12px;font-size:.9em}
              .container{max-width:900px;margin:40px auto;padding:0 20px}
              .card{background:#1a1d27;border-radius:12px;padding:28px;margin-bottom:20px;border:1px solid #2a2d3a}
              .card h2{color:#90caf9;margin-bottom:16px;font-size:1.2em}
              .btn{display:inline-block;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;margin:6px;transition:opacity .2s}
              .btn:hover{opacity:.85}
              .btn-primary{background:#1976D2;color:#fff}
              .btn-success{background:#27AE60;color:#fff}
              .btn-info{background:#00838F;color:#fff}
              .btn-warning{background:#F39C12;color:#fff}
              .build-info table{width:100%;border-collapse:collapse}
              .build-info td{padding:8px 12px;border-bottom:1px solid #2a2d3a}
              .build-info td:first-child{color:#90caf9;font-weight:600;width:180px}
              footer{text-align:center;padding:30px;color:#607d8b;font-size:.85em}
            </style>
          </head>
          <body>
            <div class="hero">
              <h1>🤖 Smart Student Platform</h1>
              <p>Android Appium E2E Automation Test Reports</p>
              <div class="meta">
                Build #${{ github.run_number }} | Branch: ${{ github.ref_name }} |
                Commit: ${COMMIT_SHORT} | ${BUILD_DATE}
              </div>
            </div>
            <div class="container">
              <div class="card">
                <h2>📊 Latest Test Reports</h2>
                <a href="reports/latest/execution-report.html" class="btn btn-primary">📋 Full Execution Report</a>
                <a href="reports/latest/dashboard.html" class="btn btn-success">📈 Dashboard</a>
                <a href="reports/latest/trends.html" class="btn btn-info">📉 Trends</a>
                <a href="reports/latest/execution-results.json" class="btn btn-warning">📄 JSON Report</a>
              </div>
              <div class="card build-info">
                <h2>🔧 Build Information</h2>
                <table>
                  <tr><td>Build Number</td><td>#${{ github.run_number }}</td></tr>
                  <tr><td>Branch</td><td>${{ github.ref_name }}</td></tr>
                  <tr><td>Commit SHA</td><td>${COMMIT_SHORT}</td></tr>
                  <tr><td>Triggered By</td><td>${{ github.actor }}</td></tr>
                  <tr><td>Execution Date</td><td>${BUILD_DATE}</td></tr>
                  <tr><td>Android API</td><td>${{ env.ANDROID_API_LEVEL }}</td></tr>
                  <tr><td>App Package</td><td>${{ env.APP_PACKAGE }}</td></tr>
                  <tr><td>Test Suite</td><td>${{ env.TEST_SUITE }}</td></tr>
                </table>
              </div>
              <div class="card">
                <h2>📂 Report History</h2>
                <a href="reports/history/" class="btn btn-info">📁 All Historical Reports</a>
                <a href="reports/history/build-${{ github.run_number }}/" class="btn btn-warning">🏗️ Current Build Reports</a>
              </div>
            </div>
            <footer>
              <p>🤖 Smart Student Platform — Appium E2E Automation Framework</p>
              <p>Powered by Java • TestNG • Appium • ExtentReports • Apache POI • GitHub Actions</p>
            </footer>
          </body>
          </html>
          EOF
          
          echo "✅ GitHub Pages index created"

      # ── Stage 20: Publish to GitHub Pages ────────────────────
      - name: '🚀 Stage 20: Publish to GitHub Pages'
        if: always() && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ env.PAGES_DIR }}
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: |
            🤖 E2E Report Build #${{ github.run_number }} | ${{ github.ref_name }} | ${{ github.sha }}

      # ── Stage 21: GitHub Actions Summary ─────────────────────
      - name: '📝 Stage 21: Publish GitHub Actions Summary'
        if: always()
        run: |
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')
          PAGES_URL="https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d'/' -f2)"
          
          # Read summary stats if available
          SUMMARY_FILE="automation/test-reports/Summary/summary.md"
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🤖 Android Appium E2E Execution Summary

          | Field | Value |
          |---|---|
          | 🏗️ Build Number | **#${{ github.run_number }}** |
          | 📅 Execution Date | ${BUILD_DATE} |
          | 🔀 Git Commit | \`${COMMIT_SHORT}\` |
          | 🌿 Branch | \`${{ github.ref_name }}\` |
          | 👤 Triggered By | ${{ github.actor }} |
          | 📱 Device | emulator-5554 |
          | 🤖 Android API | ${{ env.ANDROID_API_LEVEL }} |
          | 📦 App Package | \`${{ env.APP_PACKAGE }}\` |
          | 🧪 Test Suite | \`${{ env.TEST_SUITE }}\` |

          ## 📊 Execution Metrics

          | Metric | Value |
          |---|---|
          | 🔢 Total Test Cases | **400+** |
          | 🧪 Modules Covered | Authentication, Registration, Profile, Navigation, Search, Filter, Dashboard, Validation, Error Handling, Authorization, Session, Notifications, File Upload, Offline, Accessibility, Responsive UI, Performance, Regression |

          > ℹ️ Detailed pass/fail statistics are available in the HTML report artifacts.

          ## 🔗 Report Links

          | Report | Link |
          |---|---|
          | 🌐 GitHub Pages | [View Live Reports](${PAGES_URL}) |
          | 📋 Latest Report | [execution-report.html](${PAGES_URL}/reports/latest/execution-report.html) |
          | 📈 Dashboard | [dashboard.html](${PAGES_URL}/reports/latest/dashboard.html) |
          | 📄 JSON | [execution-results.json](${PAGES_URL}/reports/latest/execution-results.json) |

          ## 📁 Artifacts
          - \`appium-e2e-reports-build-${{ github.run_number }}\` — Excel, HTML, JSON, Screenshots, Logs

          ---
          *Generated by Smart Student Platform Appium Framework*
          EOF

      # ── Cleanup ───────────────────────────────────────────────
      - name: '🧹 Cleanup Emulator & Appium'
        if: always()
        run: |
          kill ${{ env.APPIUM_PID }} 2>/dev/null || true
          kill ${{ env.EMULATOR_PID }} 2>/dev/null || true
          adb emu kill 2>/dev/null || true
          echo "✅ Cleanup completed"

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — FAILURE GATE
  # ════════════════════════════════════════════════════════════════
