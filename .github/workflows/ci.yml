name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: %USERPROFILE%\.cache\pip
          key: ${{ runner.os }}-pip-${{ hashFiles('selenium_tests/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv selenium_tests\.venv
          .\selenium_tests\.venv\Scripts\Activate.ps1
          pip install --upgrade pip
          pip install -r selenium_tests\requirements.txt

      - name: Generate placeholder test cases (300+)
        run: |
          .\selenium_tests\.venv\Scripts\Activate.ps1
          python selenium_tests\generate_test_cases.py

      - name: Run E2E tests with Pytest
        run: |
          .\selenium_tests\.venv\Scripts\Activate.ps1
          pytest -m e2e --junitxml=selenium_tests\reports\junit.xml selenium_tests\tests

      - name: Generate Excel dashboard report
        run: |
          .\selenium_tests\.venv\Scripts\Activate.ps1
          python selenium_tests\utils\generate_dashboard_report.py

      - name: Upload Excel report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Report
          path: selenium_tests/Test Results/Excel/E2E_Test_Report_SmartStudent_Platform.xlsx

      - name: Upload JUnit XML report (optional)
        uses: actions/upload-artifact@v4
        with:
          name: JUnit-Report
          path: selenium_tests/reports/junit.xml
