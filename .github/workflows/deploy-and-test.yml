name: Deploy and Live E2E Test

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web Application
        # Important: the base-href must match the repository name for GitHub Pages
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  live-selenium-tests:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Selenium Requirements
        run: |
          cd selenium_tests
          pip install -r requirements.txt

      - name: Wait for Deployment (Sleep)
        # Give GitHub Pages a few seconds to propagate the new build
        run: sleep 30

      - name: Run Selenium Live Tests
        env:
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          cd selenium_tests
          pytest tests/test_live_deployment.py --html="Test Results/HTML/execution-report.html" --self-contained-html --junitxml="Test Results/report.xml"
        continue-on-error: true

      - name: Generate Reports
        env:
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          cd selenium_tests
          python utils/report_generator.py

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-test-reports
          path: selenium_tests/Test Results/
          retention-days: 14

      - name: Publish Summary to GitHub Actions
        run: |
          cat "selenium_tests/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
