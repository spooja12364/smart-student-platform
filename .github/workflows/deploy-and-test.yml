name: Deploy and Live E2E Test

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Web Application
        # The base-href must match the repository name for GitHub Pages
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  live-selenium-tests:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: selenium_tests/requirements.txt

      - name: Install Chrome & ChromeDriver
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable

      - name: Install Selenium requirements
        run: |
          cd selenium_tests
          pip install -r requirements.txt

      - name: Create Test Results directories
        run: |
          mkdir -p "selenium_tests/Test Results/HTML"
          mkdir -p "selenium_tests/Test Results/Excel"
          mkdir -p "selenium_tests/Test Results/Summary"

      - name: Wait for GitHub Pages deployment to propagate
        run: sleep 60

      - name: Run Selenium Live Tests
        env:
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          cd selenium_tests
          pytest tests/test_live_deployment.py \
            --html="Test Results/HTML/execution-report.html" \
            --self-contained-html \
            --junitxml="Test Results/report.xml" \
            -v --tb=short
        continue-on-error: true

      - name: Generate Reports (Excel + Summary Markdown)
        env:
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          cd selenium_tests
          python utils/report_generator.py "Test Results/report.xml"

      - name: Ensure summary.md exists (fallback)
        run: |
          SUMMARY="selenium_tests/Test Results/Summary/summary.md"
          if [ ! -f "$SUMMARY" ]; then
            echo "# Live E2E Test Summary" > "$SUMMARY"
            echo "No test results XML found — tests may have been skipped." >> "$SUMMARY"
          fi

      - name: Publish Summary to GitHub Actions
        run: cat "selenium_tests/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-test-reports
          path: selenium_tests/Test Results/
          retention-days: 14
