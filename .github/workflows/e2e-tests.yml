name: E2E and Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Create Test Results directories
        run: |
          mkdir -p "Test Results/junit"
          mkdir -p "Test Results/html-report"
          mkdir -p "Test Results/screenshots"

      - name: Activate Dart global tools
        run: |
          dart pub global activate junitreport
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Run Flutter Tests
        run: flutter test --machine > machine.log 2>&1 || true

      - name: Generate JUnit XML Report
        run: |
          dart pub global run junitreport:junitreport \
            --input machine.log \
            --output "Test Results/junit/TEST-flutter.xml"

      - name: Generate Summary Markdown
        run: |
          PASSED=$(grep -c '"result":"success"' machine.log || echo 0)
          FAILED=$(grep -c '"result":"error"' machine.log || echo 0)
          TOTAL=$((PASSED + FAILED))
          cat <<EOF > "Test Results/summary.md"
          # Flutter Test Execution Summary

          | Metric | Value |
          |--------|-------|
          | Total  | $TOTAL |
          | Passed | $PASSED |
          | Failed | $FAILED |

          > Full JUnit and HTML reports are available in the workflow artifacts.
          EOF

      - name: Publish Summary to GitHub Actions
        run: cat "Test Results/summary.md" >> $GITHUB_STEP_SUMMARY

      - name: Upload Test Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-reports
          path: Test Results/
          retention-days: 14

      - name: Fail if tests failed
        run: |
          if grep -q '"result":"error"' machine.log; then
            echo "One or more Flutter tests failed!"
            exit 1
          fi
          echo "All Flutter tests passed."
