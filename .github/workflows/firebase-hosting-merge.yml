name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - feedsmart-web && npm install && npm run build
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd feedsmart-web && npm install && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMART_STUDENT_PLATFORM_FE510 }}
          channelId: live
          projectId: smart-student-platform-fe510
