# ================================================================
# Smart Student Platform - Appium Test Configuration
# Override any value with system properties in CI/CD:
#   -DdeviceName="emulator-5554"  -DappiumPort=4723  etc.
# ================================================================

appium:
  host: "127.0.0.1"
  port: 4723

device:
  name: "emulator-5554"
  androidVersion: "14.0"
  udid: "emulator-5554"

app:
  package: "com.example.smart_student_platform"
  activity: "com.example.smart_student_platform.MainActivity"
  apkPath: "../../build/app/outputs/flutter-apk/app-debug.apk"
  version: "1.0.0"

timeouts:
  implicitWait: 10
  explicitWait: 30
  pageLoad: 60

testData:
  validEmail: "testuser@smartstudent.com"
  validPassword: "Test@12345"

reports:
  dir: "test-reports"
  screenshots: "test-reports/screenshots"
  logs: "test-reports/logs"

execution:
  threadCount: 1
  retryCount: 2
